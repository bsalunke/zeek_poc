services:
  # Nginx with WEAK cipher configuration (for testing detection)
  nginx-weak:
    image: nginx:1.27-alpine
    container_name: nginx-weak-ciphers
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx-weak.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - cipher-test-net

  # Nginx with STRONG cipher configuration (baseline comparison)
  nginx-strong:
    image: nginx:1.27-alpine
    container_name: nginx-strong-ciphers
    ports:
      - "8444:443"
    volumes:
      - ./nginx/nginx-strong.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - cipher-test-net

  # Traffic generator + packet capture — all in one container
  # Generates TLS connections to both servers, captures to pcap
  tester:
    image: nicolaka/netshoot
    container_name: cipher-tester
    networks:
      - cipher-test-net
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./output:/data
    depends_on:
      - nginx-weak
      - nginx-strong
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[*] Starting packet capture..."
        tcpdump -i any -w /data/cipher-test.pcap "port 443" &
        TCPDUMP_PID=$$!
        sleep 2

        echo ""
        echo "=== Testing WEAK cipher server (nginx-weak:443) ==="
        echo ""

        echo -n "[1] Default:           "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" https://nginx-weak:443/ 2>/dev/null || echo "FAILED"

        echo -n "[2] Force TLS 1.0:     "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --tls-max 1.0 --tlsv1.0 https://nginx-weak:443/ 2>/dev/null || echo "FAILED/REJECTED"

        echo -n "[3] Force TLS 1.1:     "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --tls-max 1.1 --tlsv1.1 https://nginx-weak:443/ 2>/dev/null || echo "FAILED/REJECTED"

        echo -n "[4] Request RC4:       "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --ciphers RC4-SHA https://nginx-weak:443/ 2>/dev/null || echo "FAILED/REJECTED"

        echo -n "[5] Request 3DES:      "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --ciphers DES-CBC3-SHA https://nginx-weak:443/ 2>/dev/null || echo "FAILED/REJECTED"

        echo -n "[6] AES-CBC no PFS:    "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --ciphers AES128-SHA https://nginx-weak:443/ 2>/dev/null || echo "FAILED/REJECTED"

        echo -n "[7] AES-GCM no PFS:    "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --ciphers AES128-GCM-SHA256 https://nginx-weak:443/ 2>/dev/null || echo "FAILED/REJECTED"

        echo -n "[8] ECDHE+AES-GCM:     "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --ciphers ECDHE-RSA-AES128-GCM-SHA256 https://nginx-weak:443/ 2>/dev/null || echo "FAILED/REJECTED"

        echo ""
        echo "=== Testing STRONG cipher server (nginx-strong:443) ==="
        echo ""

        echo -n "[9] Default:           "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" https://nginx-strong:443/ 2>/dev/null || echo "FAILED"

        echo -n "[10] Force TLS 1.3:    "
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --tlsv1.3 https://nginx-strong:443/ 2>/dev/null || echo "FAILED/REJECTED"

        echo -n "[11] RC4 (expect fail):"
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --ciphers RC4-SHA https://nginx-strong:443/ 2>/dev/null || echo "REJECTED (good!)"

        echo -n "[12] 3DES (expect fail):"
        curl -sk -o /dev/null -w "%{ssl_version}/%{ssl_cipher}\n" --ciphers DES-CBC3-SHA https://nginx-strong:443/ 2>/dev/null || echo "REJECTED (good!)"

        echo ""
        echo "[*] Extra connections for statistics..."
        for i in $$(seq 1 5); do
          curl -sk -o /dev/null https://nginx-weak:443/ 2>/dev/null || true
          curl -sk -o /dev/null https://nginx-strong:443/ 2>/dev/null || true
          curl -sk -o /dev/null --ciphers AES128-SHA https://nginx-weak:443/ 2>/dev/null || true
        done

        echo "[*] Stopping capture..."
        sleep 2
        kill $$TCPDUMP_PID 2>/dev/null || true
        wait $$TCPDUMP_PID 2>/dev/null || true
        sleep 1

        echo "[+] Done. PCAP saved to /data/cipher-test.pcap"
        ls -lh /data/cipher-test.pcap

networks:
  cipher-test-net:
    driver: bridge
