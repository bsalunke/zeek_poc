server {
    listen 443 ssl;
    server_name strong-cipher-server;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # HARDENED CONFIG — only strong ciphers
    # TLS 1.2+ only, AEAD ciphers, PFS required
    ssl_protocols TLSv1.2 TLSv1.3;

    # Only AEAD ciphers with ECDHE (Perfect Forward Secrecy)
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    ssl_prefer_server_ciphers on;

    # ECDH curve
    ssl_ecdh_curve secp384r1;

    # OCSP stapling
    ssl_stapling off;

    location / {
        return 200 '{"server": "strong-cipher-server", "status": "ok", "note": "STRONG CIPHERS ONLY"}';
        add_header Content-Type application/json;
    }

    location /health {
        return 200 'healthy';
        add_header Content-Type text/plain;
    }
}
