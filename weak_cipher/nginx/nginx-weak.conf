server {
    listen 443 ssl;
    server_name weak-cipher-server;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # DELIBERATELY WEAK CONFIG — FOR TESTING ONLY
    # Enable old protocol versions
    ssl_protocols SSLv3 TLSv1 TLSv1.1 TLSv1.2;

    # Enable weak cipher suites alongside strong ones
    # This includes: RC4, 3DES, DES, NULL, static RSA (no PFS), MD5-based
    ssl_ciphers ALL:COMPLEMENTOFALL:+RC4:+DES:+3DES:+MD5:+NULL:+EXPORT:+eNULL:+aNULL;

    ssl_prefer_server_ciphers off;

    location / {
        return 200 '{"server": "weak-cipher-server", "status": "ok", "warning": "WEAK CIPHERS ENABLED"}';
        add_header Content-Type application/json;
    }

    location /health {
        return 200 'healthy';
        add_header Content-Type text/plain;
    }
}
